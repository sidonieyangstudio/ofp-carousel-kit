function isDarkBg(hex) {
  const h = hex.replace('#','');
  const r = parseInt(h.slice(0,2), 16);
  const g = parseInt(h.slice(2,4), 16);
  const b = parseInt(h.slice(4,6), 16);
  return (0.299 * r + 0.587 * g + 0.114 * b) / 255 < 0.6;
}
function parsePageNum(pn) {
  if (!pn) return null;
  const m = pn.match(/(\d+)\s*\/\s*(\d+)/);
  if (!m) return null;
  return { current: parseInt(m[1],10), total: parseInt(m[2],10) };
}
function hexToRgba(hex, alpha) {
  if (!hex) return `rgba(0,0,0,${alpha})`;
  if (hex.startsWith('rgba') || hex.startsWith('rgb')) return hex;
  const h = hex.replace('#','');
  const r = parseInt(h.slice(0,2), 16);
  const g = parseInt(h.slice(2,4), 16);
  const b = parseInt(h.slice(4,6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

async function svgToPng(svgDataUrl, size) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, size, size);
      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror = reject;
    img.src = svgDataUrl;
  });
}

// 匯出 — 優先 modern-screenshot，fallback dom-to-image-more
async function exportToPng(node, opts) {
  const { width, height, scale } = opts;
  // 1. modern-screenshot
  if (window.modernScreenshot && typeof window.modernScreenshot.domToPng === 'function') {
    try {
      return await window.modernScreenshot.domToPng(node, {
        width, height, scale,
        backgroundColor: null,
        // 不覆寫 font 選項，讓 modern-screenshot 自動把 @font-face（含 Google Fonts）內嵌到 SVG，
        // 避免 Nunito / Jost 在 foreignObject 內取不到實際字型檔、用 synthetic bold 描粗造成邊緣模糊
      });
    } catch (e) {
      console.warn('modern-screenshot failed, trying dom-to-image', e);
    }
  }
  // 2. dom-to-image-more
  if (window.domtoimage && typeof window.domtoimage.toPng === 'function') {
    return await window.domtoimage.toPng(node, {
      width, height, bgcolor: null, quality: 1.0, scale,
    });
  }
  throw new Error('沒有可用的匯出函式庫');
}

    if (!t) return null;
    const parts = [];
    const re = /\[([^\]]+)\]/g;
    let lastIdx = 0, m, key = 0;
    while ((m = re.exec(t)) !== null) {
      if (m.index > lastIdx) parts.push(<span key={key++}>{t.slice(lastIdx, m.index)}</span>);
      parts.push(
        <span key={key++} style={{
          display: 'inline-block',
          background: highlightBg, color: highlightText,
          padding: '0 24px', borderRadius: 16, margin: '0 4px',
          WebkitBoxDecorationBreak: 'clone', boxDecorationBreak: 'clone',
        }}>{m[1]}</span>
      );
      lastIdx = m.index + m[0].length;
    }
    if (lastIdx < t.length) parts.push(<span key={key++}>{t.slice(lastIdx)}</span>);
    return parts;
  };

  return (
    <div style={{
      width: size.w, height: size.h, background: bg, color: text,
      padding: '100px 100px 90px 100px',
      display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
        <span style={{ fontFamily: fontFamily(chipFont), fontSize: chipSize, fontWeight: chipWeight, color: chipColor }}>{data.chip}</span>
        {data.pageNum && (
          <span style={{ fontFamily: fontFamily(pageNumFont), fontSize: chipSize, fontWeight: chipWeight, color: chipColor, letterSpacing: '0.18em' }}>{data.pageNum}</span>
        )}
      </div>
      <div style={{

        <h1 style={{

function App() {
  const [templateKey, setTemplateKey] = useState('cover');
  const [sizeKey, setSizeKey] = useState('4:5');
  const [allData, setAllData] = useState(DEFAULT_DATA);
  const [exporting, setExporting] = useState(false);
  const [showAdvanced, setShowAdvanced] = useState(false);
  const [logos, setLogos] = useState({ light: LOGO_LIGHT_SVG, dark: LOGO_DARK_SVG, ready: false });
  // 雲端上傳相關 state
  const [adminInput, setAdminInput] = useState('');
  const [uploading, setUploading]   = useState(false);
  const [uploadedUrl, setUploadedUrl] = useState('');
  const [copied, setCopied]         = useState(false);
  // 多頁清單 state（階段 D）
  const [pages, setPages] = useState([]); // [{ template, data }]
  const [currentPageIdx, setCurrentPageIdx] = useState(-1); // -1 = 沒選頁
  const [batchExporting, setBatchExporting] = useState(false);
  const [batchUploading, setBatchUploading] = useState(false);
  const [batchUrls, setBatchUrls] = useState([]);
  const unlocked = adminInput !== '' && adminInput === ADMIN_PASSWORD && ADMIN_PASSWORD !== '__PLACEHOLDER_PASSWORD__';
  const canvasRef = useRef(null);
  const uploadWidgetRef = useRef(null);

  useEffect(() => {
    (async () => {
      try {
        const [light, dark] = await Promise.all([
          svgToPng(LOGO_LIGHT_SVG, 256),
          svgToPng(LOGO_DARK_SVG, 256),
        ]);
        setLogos({ light, dark, ready: true });
      } catch (e) {
        console.warn('SVG→PNG 轉換失敗', e);
      }
    })();
  }, []);

  const template = TEMPLATES[templateKey];
  const size = SIZES[sizeKey];
  // 2026-04-22 v3 清潔版：選了頁就直接用 pages[idx].data 渲染（單一 source of truth），
  // 沒選頁才用 allData。這樣編輯絕對不會汙染別頁。
  const isBoundToPage = currentPageIdx >= 0 && pages[currentPageIdx] && pages[currentPageIdx].template === templateKey;
  const data = isBoundToPage ? pages[currentPageIdx].data : allData[templateKey];
  const palette = PALETTES[data.palette] || PALETTES['經典橘'];
  const Component = template.component;

  // 2026-04-22 v3 清潔版：單一 source of truth。綁定時寫 pages[idx].data；未綁定時寫 allData[templateKey]。
  const isCurrentPageEditable = () =>
    currentPageIdx >= 0 && pages[currentPageIdx] && pages[currentPageIdx].template === templateKey;

  const updateField = (field, value) => {
    if (isCurrentPageEditable()) {
      setPages(prev => {
        if (currentPageIdx < 0 || currentPageIdx >= prev.length) return prev;
        const cur = prev[currentPageIdx];
        if (cur.template !== templateKey) return prev;
        const next = [...prev];
        next[currentPageIdx] = { ...cur, data: { ...cur.data, [field]: value } };
        return next;
      });
    } else {
      setAllData(prev => ({ ...prev, [templateKey]: { ...prev[templateKey], [field]: value } }));
    }
  };
  const updateOverride = (field, value) => {
    if (isCurrentPageEditable()) {
      setPages(prev => {
        if (currentPageIdx < 0 || currentPageIdx >= prev.length) return prev;
        const cur = prev[currentPageIdx];
        if (cur.template !== templateKey) return prev;
        const palette = cur.data.palette;
        const byPal = { ...(cur.data.overridesByPalette || {}) };
        byPal[palette] = { ...(byPal[palette] || {}), [field]: value };
        const next = [...prev];
        next[currentPageIdx] = { ...cur, data: { ...cur.data, overridesByPalette: byPal } };
        return next;
      });
    } else {
      setAllData(prev => {
        const cur = prev[templateKey];
        const p = cur.palette;
        const byPal = { ...(cur.overridesByPalette || {}) };
        byPal[p] = { ...(byPal[p] || {}), [field]: value };
        return { ...prev, [templateKey]: { ...cur, overridesByPalette: byPal } };
      });
    }
  };
  const resetOverrides = () => {
    if (isCurrentPageEditable()) {
      setPages(prev => {
        if (currentPageIdx < 0 || currentPageIdx >= prev.length) return prev;
        const cur = prev[currentPageIdx];
        if (cur.template !== templateKey) return prev;
        const palette = cur.data.palette;
        const byPal = { ...(cur.data.overridesByPalette || {}) };
        byPal[palette] = {};
        const next = [...prev];
        next[currentPageIdx] = { ...cur, data: { ...cur.data, overridesByPalette: byPal } };
        return next;
      });
    } else {
      setAllData(prev => {
        const cur = prev[templateKey];
        const p = cur.palette;
        const byPal = { ...(cur.overridesByPalette || {}) };
        byPal[p] = {};
        return { ...prev, [templateKey]: { ...cur, overridesByPalette: byPal } };
      });
    }
  };

  // 切版型時自動脫離綁定（避免 currentPageIdx 指向不同 template 的頁）
  const handleSetTemplateKey = (key) => {
    setTemplateKey(key);
    if (currentPageIdx >= 0 && pages[currentPageIdx] && pages[currentPageIdx].template !== key) {
      setCurrentPageIdx(-1);
    }
  };

  // ─── 多頁清單 helpers（階段 D）─────────────────────
  // 內頁編號自動算（每次 pages 異動都跑一次）
  const renumberInnerPages = (arr) => {
    let counter = 0;
    return arr.map(p => {
      if (p.template !== 'inner') return p;
      counter += 1;
      return { ...p, data: { ...p.data, number: String(counter).padStart(2, '0') } };
    });
  };
  // v3 清潔版：snapshot 從正確 source 取（綁定中→從 pages[idx]；未綁定→從 allData）
  const snapshotCurrent = () => {
    const source = (currentPageIdx >= 0 && pages[currentPageIdx] && pages[currentPageIdx].template === templateKey)
      ? pages[currentPageIdx].data
      : allData[templateKey];
    return {
      template: templateKey,
      data: JSON.parse(JSON.stringify(source)),
    };
  };
  const addCurrentToPages = () => {
    setPages(prev => renumberInnerPages([...prev, snapshotCurrent()]));
    // 加完後脫離綁定，讓使用者繼續編輯（做下一張類似的）不會汙染剛加的頁
    // 要修剛加的頁 → 點 pages 清單最後一個切回編輯模式
    setCurrentPageIdx(-1);
  };
  const updateCurrentPage = () => {
    // v3 下編輯直接改 pages，此函數保留但實際用不到（UI 已移除覆寫按鈕）
    if (currentPageIdx < 0) return;
    setPages(prev => {
      const next = [...prev];
      next[currentPageIdx] = snapshotCurrent();
      return renumberInnerPages(next);
    });
  };
  // v3 清潔版：只設 templateKey + currentPageIdx；data 會從 pages[idx].data 讀（不動 allData）
  const loadPage = (idx) => {
    const page = pages[idx];
    if (!page) return;
    setTemplateKey(page.template);
    setCurrentPageIdx(idx);
  };
  const removePage = (idx) => {
    setPages(prev => {
      const next = renumberInnerPages(prev.filter((_, i) => i !== idx));
      if (currentPageIdx === idx) setCurrentPageIdx(-1);
      else if (currentPageIdx > idx) setCurrentPageIdx(currentPageIdx - 1);
      return next;
    });
  };
  const clearPages = () => {
    if (!confirm(`清空全部 ${pages.length} 頁？`)) return;
    setPages([]);
    setCurrentPageIdx(-1);
    setBatchUrls([]);
  };

  // 批次上雲 helper：直接 POST Cloudinary REST API（不用 Widget 彈框）
  const uploadOneToCloudinary = async (blob, fileName) => {
    const formData = new FormData();
    formData.append('file', blob, fileName);
    formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
    formData.append('folder', 'social-publisher/ofp-images');
    const resp = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
      method: 'POST',
      body: formData,
    });
    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`Cloudinary HTTP ${resp.status}: ${errText.slice(0, 200)}`);
    }
    const data = await resp.json();
    return data.secure_url;
  };

  // 批次上雲（階段 D-3）
  const uploadAllToCloudinary = async () => {
    if (pages.length === 0) return;
    if (!unlocked) { alert('請先輸入管理員密碼解鎖'); return; }
    if (!CLOUD_UPLOAD_READY) { alert('雲端未設定：config.js 缺項'); return; }
    setBatchUploading(true);
    setBatchUrls([]);
    const originalIdx = currentPageIdx;
    const collected = [];
    try {
      for (let i = 0; i < pages.length; i++) {
        const page = pages[i];
        setTemplateKey(page.template);
        setAllData(prev => ({ ...prev, [page.template]: JSON.parse(JSON.stringify(page.data)) }));
        setCurrentPageIdx(i);
        await new Promise(r => setTimeout(r, 800));
        if (document.fonts && document.fonts.ready) await document.fonts.ready;

        const node = canvasRef.current;
        if (!node) throw new Error(`第 ${i + 1} 頁 canvas 未準備好`);
        const originalTransform = node.style.transform;
        const originalTransformOrigin = node.style.transformOrigin;
        node.style.transform = 'none';
        node.style.transformOrigin = 'top left';
        await new Promise(r => setTimeout(r, 200));
        const dataUrl = await exportToPng(node, { width: size.w, height: size.h, scale: 2 });
        node.style.transform = originalTransform;
        node.style.transformOrigin = originalTransformOrigin;

        const blob = await (await fetch(dataUrl)).blob();
        if (blob.size > 5 * 1024 * 1024) {
          throw new Error(`第 ${i + 1} 頁 ${(blob.size/1024/1024).toFixed(2)}MB > 5MB 上限`);
        }
        const numStr = String(i + 1).padStart(2, '0');
        const fileName = `OFP_p${numStr}_${page.template}_${sizeKey.replace(':','x')}_${Date.now()}.png`;
        const url = await uploadOneToCloudinary(blob, fileName);
        collected.push(url);

      if (!Array.isArray(decoded.pages)) return;
      const validPages = decoded.pages
        .filter(p => p && p.template && TEMPLATES[p.template] && p.data && typeof p.data === 'object')

        if (!node) throw new Error(`第 ${i + 1} 頁 canvas 未準備好`);

        const originalTransformOrigin = node.style.transformOrigin;
        node.style.transform = 'none';

    if (!window.cloudinary || typeof window.cloudinary.createUploadWidget !== 'function') {
      alert('Cloudinary Upload Widget 未載入（請確認網路）');
      return;
    }

    setUploading(true);
    setUploadedUrl('');
    setCopied(false);

    try {
      // 1. 產出高品質 PNG（重用 handleExport 的轉場邏輯）
      const node = canvasRef.current;
      const originalTransform = node.style.transform;
      const originalTransformOrigin = node.style.transformOrigin;
      node.style.transform = 'none';
      node.style.transformOrigin = 'top left';
      if (document.fonts && document.fonts.ready) await document.fonts.ready;

      const dataUrl = await exportToPng(node, { width: size.w, height: size.h, scale: 2 });
      node.style.transform = originalTransform;
      node.style.transformOrigin = originalTransformOrigin;

      // 2. DataURL → Blob
      const blob = await (await fetch(dataUrl)).blob();
      const fileName = `OFP_${templateKey}_${sizeKey.replace(':','x')}_${Date.now()}.png`;
      const file = new File([blob], fileName, { type: 'image/png' });

      // 2.5 前端大小擋（Cloudinary free plan 硬上限 10MB；我們再加嚴 5MB 防呆）
      const MAX_UPLOAD_SIZE = 5 * 1024 * 1024;

        alert(`檔案太大：${(file.size / 1024 / 1024).toFixed(2)} MB，上限 5 MB。請調小尺寸或換模板再試。`);
        setUploading(false);
        return;
      }

      // 3. 開啟 Cloudinary Upload Widget（Unsigned，來源 local，預先塞入剛產的 PNG）
      const widget = window.cloudinary.createUploadWidget({
        cloudName:    CLOUDINARY_CLOUD_NAME,
        uploadPreset: CLOUDINARY_UPLOAD_PRESET,
        sources: ['local'],
        multiple: false,
        showUploadMoreButton: false,
        singleUploadAutoClose: true,
        folder: 'social-publisher/ofp-images',
        resourceType: 'image',
      }, (error, result) => {
        if (error) {
          console.error('上傳錯誤', error);
          alert('上傳失敗：' + (error.statusText || error.message || JSON.stringify(error)));
          setUploading(false);
          return;
        }
        if (!result) return;
        if (result.event === 'success') {
          setUploadedUrl(result.info.secure_url);
        }
        if (result.event === 'queues-end' || result.event === 'close' || result.event === 'abort') {
          setUploading(false);
        }
      });

      // 直接送檔、跳過檔案選擇器
      widget.open(undefined, { files: [file] });
    } catch (err) {

  };

  const curOv = currentOverrides(data);
  const curOvCount = Object.keys(curOv).length;

  return (
    <div className="min-h-screen" style={{ background: C.subBg }}>
      <header className="px-3 md:px-8 py-2 md:py-5 bg-white border-b flex items-center justify-between gap-2 sticky top-0 z-10" style={{ borderColor: '#e7e5e4' }}>
        <div className="flex items-baseline gap-2 md:gap-3 min-w-0">
          <span className="text-sm md:text-xl font-bold truncate" style={{ color: C.brown }}>歐的樂星球</span>
          <span className="hidden md:inline text-xs uppercase tracking-widest" style={{ color: C.rosePink }}>Carousel Kit v3.3</span>
        </div>
        <div className="flex items-center gap-1 md:gap-2 flex-shrink-0">
          {Object.entries(SIZES).map(([k, s]) => (
            <button key={k} onClick={() => setSizeKey(k)}
              className="px-2.5 md:px-4 py-1 md:py-1.5 text-[11px] md:text-sm rounded-full transition"
              style={{
                background: sizeKey === k ? C.brown : C.subBg,
                color: sizeKey === k ? '#fff' : C.brown,
              }}>{s.label}</button>
          ))}
          <div className="hidden md:block w-px h-6 mx-2" style={{ background: '#e7e5e4' }} />
          {/* 隱藏式管理員密碼欄：輸入正確才解鎖雲端上傳 */}
          <input
            type="password"
            value={adminInput}
            onChange={e => setAdminInput(e.target.value)}
            placeholder="●●●"
            title="管理員密碼（輸入正確才顯示雲端上傳）"
            className="hidden md:block w-20 px-2 py-1 text-[11px] rounded-full border"
            style={{
              borderColor: unlocked ? C.orange : '#e7e5e4',
              background: unlocked ? '#fff7f1' : '#faf8f6',
              color: C.brown,
            }}
          />
          <button onClick={handleExport} disabled={exporting}
            className="px-3 md:px-5 py-1.5 md:py-2 text-xs md:text-sm font-bold rounded-full text-white disabled:opacity-50 transition whitespace-nowrap"
            style={{ background: C.orange }}>
            {exporting ? '匯出中…' : '↓ PNG'}
          </button>
          {unlocked && (
            <button onClick={handleUpload} disabled={uploading}
              className="px-3 md:px-5 py-1.5 md:py-2 text-xs md:text-sm font-bold rounded-full text-white disabled:opacity-50 transition whitespace-nowrap"
              style={{ background: C.brown }}
              title="上傳到 Cloudinary">
              {uploading ? '上傳中…' : '↑ 雲端'}
            </button>
          )}
        </div>
      </header>

      {/* 上傳完成網址列：解鎖 + 有網址才顯示 */}
      {unlocked && uploadedUrl && (
        <div className="px-3 md:px-8 py-2 flex items-center gap-2 border-b" style={{ background: '#fff7f1', borderColor: '#f1d5c0' }}>
          <span className="text-[11px] font-semibold whitespace-nowrap" style={{ color: C.brown }}>✦ 雲端網址</span>
          <input
            type="text"
            value={uploadedUrl}
            readOnly
            onClick={e => e.target.select()}
            className="flex-1 min-w-0 px-2 py-1 text-[11px] rounded border bg-white font-mono"
            style={{ borderColor: '#f1d5c0', color: C.brown }}
          />
          <button onClick={copyUrl}
            className="px-3 py-1 text-[11px] font-semibold rounded-full whitespace-nowrap transition"
            style={{ background: copied ? C.orange : C.brown, color: '#fff' }}>
            {copied ? '✓ 已複製' : '複製'}
          </button>
          <button onClick={() => setUploadedUrl('')}
            className="px-2 py-1 text-[11px] rounded-full transition"
            style={{ background: 'transparent', color: C.rosePink }}
            title="清除">✘</button>
        </div>
      )}

      <div className="flex flex-col-reverse md:flex-row" style={{ minHeight: 'calc(100vh - 68px)' }}>
        <aside className="w-full md:w-[380px] p-4 md:p-6 bg-white md:border-r border-t md:border-t-0 md:overflow-y-auto no-scrollbar md:max-h-[calc(100vh-68px)]" style={{ borderColor: '#e7e5e4' }}>
          {/* 多頁清單（階段 D）*/}
          <div className="mb-6 pb-5 border-b" style={{ borderColor: '#f1ece8' }}>
            <div className="flex items-center justify-between mb-2">
              <span className="text-xs font-semibold uppercase tracking-wider" style={{ color: C.brown }}>
                ✦ 多頁清單 ({pages.length})
              </span>
              {pages.length > 0 && (
                <button onClick={clearPages} className="text-[10px] underline" style={{ color: C.rosePink }}>清空</button>
              )}
            </div>
            <button onClick={addCurrentToPages}
              className="w-full px-2 py-2 text-xs font-semibold rounded-lg transition mb-2"
              style={{ background: C.orange, color: '#fff' }}>
              + 加新頁（目前畫面複製成新頁面）
            </button>
            {pages.length > 0 && currentPageIdx >= 0 && pages[currentPageIdx] && pages[currentPageIdx].template === templateKey && (
              <div className="text-[10px] text-center py-1 mb-2 rounded"
                style={{ background: C.orange, color: '#fff' }}>
                ✦ 編輯中：第 {currentPageIdx + 1} 頁（輸入直接存進該頁）
              </div>
            )}
            {pages.length > 0 && (currentPageIdx < 0 || (pages[currentPageIdx] && pages[currentPageIdx].template !== templateKey)) && (
              <div className="text-[10px] text-center py-1 mb-2 rounded"
                style={{ background: C.subBg, color: C.brown }}>
                ⚈ 未綁定頁面｜按「+ 加新頁」加入清單，或下方點頁面繼續編輯
              </div>
            )}
            {pages.length > 0 && (
              <div className="space-y-1 mb-2">
                {pages.map((p, i) => {
                  const tplName = TEMPLATES[p.template]?.name || p.template;
                  const num = p.data.number ? `(${p.data.number})` : '';
                  const isActive = currentPageIdx === i;
                  return (
                    <div key={i} className="flex items-center gap-1">
                      <button onClick={() => loadPage(i)}
                        className="flex-1 text-left px-2 py-1.5 text-xs rounded transition truncate"
                        style={{
                          background: isActive ? C.brown : C.subBg,
                          color: isActive ? '#fff' : C.brown,
                          fontWeight: isActive ? 600 : 400,
                        }}
                        title={`點擊載入第 ${i + 1} 頁`}>
                        #{i + 1} {tplName} {num}
                      </button>
                      <button onClick={() => removePage(i)}
                        className="px-2 py-1 text-xs rounded transition"
                        style={{ color: C.rosePink, background: 'transparent' }}
                        title="移除這頁">✘</button>
                    </div>
                  );
                })}
              </div>
            )}
            {pages.length === 0 && (
              <div className="text-[11px] text-center py-2" style={{ color: '#a8a29e' }}>
                編輯目前畫面 → 按「+ 加新頁」加入清單
              </div>
            )}
            {pages.length > 0 && (
              <div className="mt-3 pt-3 border-t space-y-2" style={{ borderColor: '#f1ece8' }}>
                <div className="flex gap-2">
                  <button onClick={exportAllPng} disabled={batchExporting || batchUploading}
                    className="flex-1 px-3 py-2 text-xs font-semibold rounded-lg transition"
                    style={{
                      background: C.brown, color: '#fff',
                      opacity: (batchExporting || batchUploading) ? 0.5 : 1,
                      cursor: (batchExporting || batchUploading) ? 'not-allowed' : 'pointer',
                    }}>
                    {batchExporting ? `匯出中… (${pages.length})` : `↓ 全部 PNG (${pages.length})`}
                  </button>
                  {unlocked && (
                    <button onClick={uploadAllToCloudinary} disabled={batchExporting || batchUploading}
                      className="flex-1 px-3 py-2 text-xs font-semibold rounded-lg transition"
                      style={{
                        background: C.orange, color: '#fff',
                        opacity: (batchExporting || batchUploading) ? 0.5 : 1,
                        cursor: (batchExporting || batchUploading) ? 'not-allowed' : 'pointer',
                      }}>
                      {batchUploading ? `上雲中… (${batchUrls.length}/${pages.length})` : `↑ 全部上雲 (${pages.length})`}
                    </button>
                  )}
                </div>
                <button onClick={copyShareUrl}
                  className="w-full px-3 py-1.5 text-[11px] font-medium rounded-lg transition border"
                  style={{ background: '#fff', color: C.brown, borderColor: '#e7e5e4' }}
                  title="複製能還原此清單的網址（給橡果/push-social-to-notion 用）">
                  ⧉ 複製預填網址（含全部 {pages.length} 頁）
                </button>
                {batchUrls.length > 0 && (
                  <div className="rounded-lg p-2" style={{ background: C.subBg }}>
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-[11px] font-semibold" style={{ color: C.brown }}>
                        ✓ 已上傳 {batchUrls.length} 個 URL
                      </span>
                      <button onClick={copyAllUrls}
                        className="px-2 py-0.5 text-[10px] font-semibold rounded-full transition"
                        style={{ background: C.orange, color: '#fff' }}>
                        複製全部
                      </button>
                    </div>
                    <div className="space-y-0.5 max-h-32 overflow-y-auto no-scrollbar">
                      {batchUrls.map((url, i) => (
                        <div key={i} className="text-[10px] truncate font-mono" style={{ color: C.brown }} title={url}>
                          #{String(i + 1).padStart(2, '0')} {url}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>

          <div className="mb-6">
            <div className="text-xs font-semibold uppercase tracking-wider mb-2" style={{ color: C.brown }}>版型</div>
            <div className="grid grid-cols-3 gap-2">
              {Object.entries(TEMPLATES).map(([k, t]) => (
                <button key={k} onClick={() => handleSetTemplateKey(k)}
                  className="px-3 py-2.5 text-xs font-semibold rounded-lg transition"
                  style={{
                    background: templateKey === k ? C.brown : C.subBg,
                    color: templateKey === k ? '#fff' : C.brown,
                  }}>{t.name}</button>
              ))}
            </div>
          </div>

          <div className="mb-6">
            <div className="text-xs font-semibold uppercase tracking-wider mb-2" style={{ color: C.brown }}>
              配色 <span className="normal-case font-normal" style={{ color: C.rosePink }}>（每個配色獨立儲存設定）</span>
            </div>
            <div className="flex flex-wrap gap-2">
              {Object.entries(PALETTES).map(([k, p]) => {
                const sampleBg = templateKey === 'inner' ? p.inner : (templateKey === 'cta' ? p.cta : p.cover);
                const palOvs = (data.overridesByPalette || {})[k] || {};
                const hasOv = Object.keys(palOvs).length > 0;
                return (
                  <button key={k} onClick={() => updateField('palette', k)}
                    className="flex items-center gap-2 px-3 py-1.5 text-xs rounded-full border transition"
                    style={{
                      borderColor: data.palette === k ? C.brown : '#e7e5e4',
                      background: data.palette === k ? C.brown : '#fff',
                      color: data.palette === k ? '#fff' : C.brown,
                    }}>
                    <span className="w-3 h-3 rounded-full border" style={{ background: sampleBg, borderColor: '#d6d3d1' }} />
                    {k}
                    {hasOv && <span className="text-[9px]" style={{ color: data.palette === k ? '#fff' : C.orange }}>✦</span>}
                  </button>
                );
              })}
            </div>
          </div>

          <div className="space-y-4 mb-6">
            {fields.map(f => (
              <Field key={f.k} label={f.label}
                value={data[f.k] || ''} onChange={v => updateField(f.k, v)}
                textarea={f.textarea} hint={f.hint} />
            ))}
          </div>

          <div className="border-t pt-5" style={{ borderColor: '#f1ece8' }}>
            <button onClick={() => setShowAdvanced(!showAdvanced)}
              className="flex items-center justify-between w-full px-3 py-2 rounded-lg transition"
              style={{ background: showAdvanced ? C.brown : C.subBg, color: showAdvanced ? '#fff' : C.brown }}>
              <span className="text-sm font-semibold">
                ✦ 進階調整 · {data.palette}{curOvCount > 0 ? ` · ${curOvCount} 項已調` : ''}
              </span>
              <span className="text-sm">{showAdvanced ? '▲' : '▼'}</span>
            </button>

            {showAdvanced && (
              <div className="mt-4">
                <div className="text-[10px] leading-snug p-2 rounded mb-3" style={{ background: C.subBg, color: C.brown }}>
                  設定只套用到「<b>{data.palette}</b>」配色。
                </div>
                {advancedControls()}
                <button onClick={resetOverrides}
                  className="w-full mt-6 px-3 py-2 text-xs font-semibold rounded-lg border transition"
                  style={{ borderColor: C.rosePink, color: C.rosePink, background: '#fff' }}>
                  ↺ 恢復「{data.palette}」的預設值
                </button>
              </div>
            )}
          </div>

          <div className="mt-6 pt-5 border-t text-xs leading-relaxed" style={{ borderColor: '#f1ece8' }}>
            <p className="mb-2 font-semibold" style={{ color: C.rosePink }}>✦ 小訣竅</p>
            <p style={{ color: C.brown, opacity: 0.7 }}>• 封面標題 [xxx] 套色框（色框顏色可調）</p>
            <p style={{ color: C.brown, opacity: 0.7 }}>• 分隔線按 0X / 0Y 比例填色</p>
            <p style={{ color: C.brown, opacity: 0.7 }}>• 字型：粉圓 / Chiron / Nunito / Jost</p>
            <p style={{ color: C.brown, opacity: 0.7 }}>• 字重：標題 300-900、內文 200-700</p>
            <p style={{ color: C.brown, opacity: 0.7 }}>• 配色旁 ✦ = 該配色有客製設定</p>
          </div>
        </aside>

        <main className="flex-1 flex items-center justify-center px-3 py-3 md:p-10 sticky top-[41px] md:static z-[5]" style={{ background: C.subBg }}>
          <div className="rounded-2xl overflow-hidden shadow-xl border"
            style={{
              width: size.w * previewScale,
              height: size.h * previewScale,
              background: '#eee', borderColor: '#e7e5e4',
              position: 'relative',
            }}>
            <div ref={canvasRef}
              className="ofp-export"
              style={{
                transform: `scale(${previewScale})`,
                transformOrigin: 'top left',
                width: size.w, height: size.h,
              }}>
              <Component data={data} size={size} palette={palette} logos={logos} />
            </div>
          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
